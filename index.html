// §3  MARKET API  — routes through /api/bybit proxy (fixes CORS)

async function proxyBybit(path, params = {}) {
  const qs = new URLSearchParams({ path, ...params });
  const res = await fetch(`/api/bybit?${qs.toString()}`);
  const d   = await res.json();
  if (d.retCode !== 0) throw new Error(d.retMsg ?? "Bybit error");
  return d.result;
}

async function fetchTickers() {
  const r = await proxyBybit("/v5/market/tickers", { category:"linear" });
  return r.list.filter(t => t.symbol.endsWith("USDT") && parseFloat(t.volume24h) > 500_000);
}

async function bybitPrivate(apiKey, apiSecret, method, path, body = {}) {
  try {
    const ts    = Date.now().toString();
    const recv  = "5000";
    const enc   = new TextEncoder();
    const paramStr = method === "GET"
      ? ts + apiKey + recv + new URLSearchParams(body).toString()
      : ts + apiKey + recv + JSON.stringify(body);

    const key  = await crypto.subtle.importKey("raw", enc.encode(apiSecret), { name:"HMAC", hash:"SHA-256" }, false, ["sign"]);
    const sigBuf = await crypto.subtle.sign("HMAC", key, enc.encode(paramStr));
    const sig  = Array.from(new Uint8Array(sigBuf)).map(b => b.toString(16).padStart(2,"0")).join("");

    const headers = {
      "Content-Type":       "application/json",
      "X-BAPI-API-KEY":     apiKey,
      "X-BAPI-SIGN":        sig,
      "X-BAPI-TIMESTAMP":   ts,
      "X-BAPI-RECV-WINDOW": recv,
    };

    const url = method === "GET"
      ? `/api/bybit?path=${encodeURIComponent(path)}&${new URLSearchParams(body)}`
      : `/api/bybit?path=${encodeURIComponent(path)}`;

    const res = await fetch(url, {
      method,
      headers,
      body: method !== "GET" ? JSON.stringify(body) : undefined,
    });
    return await res.json();
  } catch(e) { return { retCode:-1, retMsg:e.message }; }
}

async function getBalance(apiKey, apiSecret) {
  const d = await bybitPrivate(apiKey, apiSecret, "GET", "/v5/account/wallet-balance", { accountType:"UNIFIED" });
  if (d?.retCode !== 0) return null;
  const coin = d.result?.list?.[0]?.coin?.find(c => c.coin === "USDT");
  return parseFloat(coin?.availableToWithdraw ?? coin?.walletBalance ?? 0);
}

async function getOpenPositions(apiKey, apiSecret) {

  return (d.result?.list ?? []).filter(p => parseFloat(p.size) > 0);
}

function detectRegime(tickers) {
  if (!tickers?.length) return { key:"RANGING", confidence:50, stats:{} };
  const pcts   = tickers.map(t => parseFloat(t.price24hPcnt) * 100);
  const avg    = pcts.reduce((a,b) => a+b, 0) / pcts.length;
  const bulls  = pcts.filter(c => c >  1.5).length;
  const bears  = pcts.filter(c => c < -1.5).length;
  const spikes = pcts.filter(c => Math.abs(c) > 5).length;
  const btc    = tickers.find(t => t.symbol === "BTCUSDT");
  const fund   = parseFloat(btc?.fundingRate ?? 0);
  const total  = tickers.length;
  const stats  = { avg:avg.toFixed(2), bulls, bears, spikes, total, funding:(fund*100).toFixed(4)+"%" };

  let key = "RANGING", confidence = 58;
  if      (Math.abs(fund) > 0.001)   { key="FUNDING_EXTREME"; confidence=90; }
  else if (spikes >= 4)              { key="VOL_EXPANSION";   confidence=83; }
  else if (bulls>=6 && avg>2)        { key="TRENDING_UP";     confidence=Math.min(78+bulls,96); }
  else if (bears>=6 && avg<-2)       { key="TRENDING_DOWN";   confidence=Math.min(78+bears,96); }
  else if (bulls>=4 && avg>0.8)      { key="TRENDING_UP";     confidence=65; }
  else if (bears>=4 && avg<-0.8)     { key="TRENDING_DOWN";   confidence=65; }
  return { key, confidence, stats };
}

function buildSignal(agent, ticker, regimeKey, leverage, size) {
  if (!agent.activeIn.includes(regimeKey)) return null;
  const vol   = parseFloat(ticker.volume24h);
  if (vol < 1_000_000) return null;
  const chg   = parseFloat(ticker.price24hPcnt)*100;
  const price = parseFloat(ticker.lastPrice);
  const high  = parseFloat(ticker.highPrice24h);
  const low   = parseFloat(ticker.lowPrice24h);
  const pos   = (price-low)/((high-low)||1);
  const fund  = parseFloat(ticker.fundingRate??0);
  const res   = SIGNAL_RULES[agent.type]?.(chg,pos,regimeKey,vol,fund);
  if (!res || !res[0]) return null;
  const [side,conf,reason] = res;
  return {
    id: `${agent.id}-${ticker.symbol}-${side}`,
    agentId:agent.id, agentName:agent.name, agentType:agent.type,
    symbol:ticker.symbol, side, price,
    sl: side==="Buy" ? price*0.985 : price*1.015,
    tp: side==="Buy" ? price*1.030 : price*0.970,
    qty: parseFloat(((size*leverage)/price).toFixed(4)),
    conf:Math.round(conf), reason, leverage, size, ts:Date.now(),
  };
}

function generateSignals(tickers, regimeKey, leverage, size) {
  const byKey = new Map();
  TEAMS.forEach(team => team.agents.forEach(agent => {
    [...tickers].sort((a,b)=>parseFloat(b.volume24h)-parseFloat(a.volume24h)).slice(0,30)
      .forEach(ticker => {
        const sig = buildSignal(agent, ticker, regimeKey, leverage, size);
        if (!sig) return;
        const key = `${sig.symbol}:${sig.side}`;
        if (!byKey.has(key) || sig.conf > byKey.get(key).conf) byKey.set(key, sig);
      });
  }));
  return [...byKey.values()].sort((a,b)=>b.conf-a.conf).slice(0,24);
}

function usePulseDot() {
  const [lit,setLit] = useState(false);
  useEffect(()=>{ const t=setInterval(()=>setLit(p=>!p),1500); return()=>clearInterval(t); },[]);
  return lit;
}

function useTypewriter(text, speed=9) {
  const [shown,setShown] = useState(""); const [idx,setIdx] = useState(0); const ref=useRef(null);
  useEffect(()=>{ setShown(""); setIdx(0); },[text]);
  useEffect(()=>{
    if (!text || idx>=text.length) return;
    const t=setTimeout(()=>{ setShown(p=>p+text[idx]); setIdx(i=>i+1); },speed);
    return()=>clearTimeout(t);
  },[idx,text,speed]);
  useEffect(()=>{ if(ref.current) ref.current.scrollTop=ref.current.scrollHeight; },[shown]);
  return { shown, cursor:idx<(text?.length??0), ref };
}

function useToast() {
  const [toast,setToast] = useState(null);
  const show = useCallback((msg,type="info")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),4000); },[]);
  return { toast, show };
}

function Slider({ label, value, set, min, max, step, color, fmt, warnAbove }) {
  const pct = ((value-min)/(max-min))*100;
  return (
    <div style={{ background:C.s2,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 18px",marginBottom:12 }}>
      <div style={{ display:"flex",justifyContent:"space-between",marginBottom:10 }}>

        <span style={{ fontSize:16,color,fontWeight:700 }}>{fmt(value)}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e=>set(+e.target.value)}
        style={{ width:"100%",accentColor:color,background:`linear-gradient(90deg,${color} ${pct}%,rgba(255,255,255,0.08) ${pct}%)` }} />
      <div style={{ display:"flex",justifyContent:"space-between",marginTop:5 }}>
        <span style={{ fontSize:8,color:C.muted }}>{fmt(min)}</span>
        <span style={{ fontSize:8,color:C.muted }}>{fmt(max)}</span>
      </div>
      {warnAbove!=null && value>warnAbove && (
        <div style={{ marginTop:8,padding:"7px 10px",fontSize:9,color:C.red,lineHeight:1.6,background:`${C.red}08`,border:`1px solid ${C.red}20`,borderRadius:7 }}>

        </div>
      )}
    </div>
  );
}

function ApiPanel({ keys, setKeys, balance, positions, onTest, testStatus }) {
  const [show, setShow] = useState({ bybit:false, claude:false });
  const [local, setLocal] = useState({ bybitKey:"", bybitSecret:"", claudeKey:"" });

  function save() {
    // Persist in sessionStorage only (never leaves browser)
    sessionStorage.setItem("mm_keys", JSON.stringify(local));
    setKeys(local);
    onTest(local);
  }
  function clear() {
    sessionStorage.removeItem("mm_keys");
    setKeys({ bybitKey:"", bybitSecret:"", claudeKey:"" });
    setLocal({ bybitKey:"", bybitSecret:"", claudeKey:"" });
  }
  useEffect(()=>{
    const saved = sessionStorage.getItem("mm_keys");
    if (saved) { const k=JSON.parse(saved); setLocal(k); setKeys(k); }
  },[]);

  const connected = keys.bybitKey && keys.claudeKey;

  return (
    <div className="fade-up" style={{ maxWidth:560 }}>
      {/* Status banner */}
      <div style={{ display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderRadius:12,marginBottom:20,background:connected?`${C.green}08`:`${C.amber}08`,border:`1px solid ${connected?C.green:C.amber}30` }}>
        <Dot color={connected?C.green:C.amber} size={10} />
        <div>
          <div style={{ fontSize:12,fontWeight:700,color:connected?C.green:C.amber }}>{connected?"API CONNECTED":"API NOT CONFIGURED"}</div>
          <div style={{ fontSize:9,color:C.sub,marginTop:2 }}>{connected?"Live data and trading active":"Enter keys below to enable live regime detection and trading"}</div>
        </div>
        {connected && balance!=null && (
          <div style={{ marginLeft:"auto",textAlign:"right" }}>
            <div style={{ fontSize:9,color:C.sub }}>USDT BALANCE</div>
            <div style={{ fontSize:16,color:C.green,fontWeight:700 }}>${balance.toLocaleString(undefined,{maximumFractionDigits:2})}</div>
          </div>
        )}
      </div>

      {/* Security notice */}
      <div style={{ padding:"12px 16px",borderRadius:10,marginBottom:20,background:`${C.blue}06`,border:`1px solid ${C.blue}20`,fontSize:10,color:C.sub,lineHeight:1.8 }}>
        🔒 <strong style={{ color:C.blue }}>Security:</strong> Keys stored in <strong>session memory only</strong> — cleared on browser close.
        They are sent <strong>only to Bybit and Anthropic</strong> servers, never logged or stored anywhere else.<br/>
        For Bybit: enable <strong>Trade permission only</strong>. Do NOT enable withdrawal.
      </div>

      {/* Bybit keys */}
      <div style={{ background:C.s1,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px",marginBottom:12 }}>
        <div style={{ fontSize:10,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:14 }}>BYBIT API — LIVE MARKET DATA + TRADING</div>
        {[["API KEY","bybitKey","text"],["API SECRET","bybitSecret","password"]].map(([label,field,type])=>(
          <div key={field} style={{ marginBottom:12 }}>
            <div style={{ fontSize:9,color:C.sub,letterSpacing:2,marginBottom:6 }}>{label}</div>
            <div style={{ position:"relative" }}>
              <input type={show[field]?"text":type} value={local[field]} onChange={e=>setLocal(p=>({...p,[field]:e.target.value}))}
                placeholder={`Enter Bybit ${label.toLowerCase()}...`} />
              {type==="password" && (
                <button onClick={()=>setShow(p=>({...p,[field]:!p[field]}))}
                  style={{ position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.sub,fontSize:10 }}>
                  {show[field]?"HIDE":"SHOW"}
                </button>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* Claude key */}
      <div style={{ background:C.s1,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px",marginBottom:16 }}>
        <div style={{ fontSize:10,color:C.gold,fontWeight:700,letterSpacing:2,marginBottom:14 }}>ANTHROPIC API — AI INTELLIGENCE CASCADE</div>
        <div style={{ fontSize:9,color:C.sub,letterSpacing:2,marginBottom:6 }}>CLAUDE API KEY</div>
        <div style={{ position:"relative" }}>
          <input type={show.claudeKey?"text":"password"} value={local.claudeKey} onChange={e=>setLocal(p=>({...p,claudeKey:e.target.value}))}
            placeholder="sk-ant-..." />
          <button onClick={()=>setShow(p=>({...p,claudeKey:!p.claudeKey}))}
            style={{ position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.sub,fontSize:10 }}>
            {show.claudeKey?"HIDE":"SHOW"}
          </button>
        </div>
        <div style={{ fontSize:9,color:C.sub,marginTop:8,lineHeight:1.6 }}>
          Get your key at <span style={{ color:C.gold }}>console.anthropic.com</span>
        </div>
      </div>

      {/* Actions */}
      <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20 }}>
        <button onClick={save} style={{ padding:"12px",background:`${C.green}12`,border:`1px solid ${C.green}40`,color:C.green,borderRadius:10,fontSize:11,fontWeight:700,letterSpacing:1 }}>

          ✕ CLEAR KEYS
        </button>
      </div>

      {/* Test status */}
      {testStatus && (
        <div style={{ padding:"10px 14px",borderRadius:8,background:testStatus.ok?`${C.green}08`:`${C.red}08`,border:`1px solid ${testStatus.ok?C.green:C.red}30`,fontSize:10,color:testStatus.ok?C.green:C.red,lineHeight:1.7 }}>

      {/* Open positions */}
      {positions.length > 0 && (
        <div style={{ marginTop:20 }}>
          <div style={{ fontSize:9,color:C.sub,letterSpacing:2,marginBottom:10 }}>OPEN BYBIT POSITIONS ({positions.length})</div>
          {positions.map((p,i)=>(
            <div key={i} style={{ background:C.s1,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center" }}>

                <span style={{ fontSize:12,color:C.bright,fontWeight:700,marginRight:8 }}>{p.symbol}</span>
                <Tag color={p.side==="Buy"?C.green:C.red}>{p.side}</Tag>
              </div>
              <div style={{ display:"flex",gap:16,alignItems:"center" }}>
                <div><div style={{ fontSize:7,color:C.muted }}>SIZE</div><div style={{ fontSize:11,color:C.body,fontWeight:700 }}>{p.size}</div></div>
                <div><div style={{ fontSize:7,color:C.muted }}>ENTRY</div><div style={{ fontSize:11,color:C.body,fontWeight:700 }}>${parseFloat(p.avgPrice).toFixed(4)}</div></div>
                <div><div style={{ fontSize:7,color:C.muted }}>P&L</div><div style={{ fontSize:12,color:parseFloat(p.unrealisedPnl)>=0?C.green:C.red,fontWeight:700 }}>{parseFloat(p.unrealisedPnl)>=0?"+":""}{parseFloat(p.unrealisedPnl).toFixed(2)}</div></div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

      <div>
        <div style={{ fontSize:13,color:C.bright,fontWeight:700 }}>LIVE SIGNALS — ALL 14 AGENTS</div>
        <div style={{ fontSize:8,color:C.sub,marginTop:3 }}>Refreshed every 30s · {total??0} USDT pairs · Highest confidence first</div>
      </div>
      <div style={{ display:"flex",gap:6 }}>
        <Pill color={C.green}>{signals.filter(s=>s.side==="Buy").length} LONG</Pill>
        <Pill color={C.red}>{signals.filter(s=>s.side==="Sell").length} SHORT</Pill>
        <Pill color={mode==="live"?C.red:C.gold}>{mode==="live"?"🔴 LIVE":"📄 PAPER"}</Pill>
      </div>
    </div>
    {signals.length===0
      ? <div style={{ textAlign:"center",padding:60,color:C.muted,fontSize:12 }}>No signals in current regime. Waiting for next scan...</div>
      : <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(360px,1fr))",gap:10 }}>
          {signals.map(s=><SignalCard key={s.id} sig={s} onExec={onExec} mode={mode} />)}
        </div>}
  </div>
));

const TradesView = memo(({ trades, paperPnl, dailyLoss, maxLoss, maxTrades, openCount, mode }) => (
  <div className="fade-up">
    <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:8,marginBottom:18 }}>
      <StatBox label="Open Trades" value={`${openCount}/${maxTrades}`} color={C.blue} />
      <StatBox label="Closed" value={trades.filter(t=>t.status==="closed").length} color={C.sub} />
      <StatBox label="Paper P&L" value={(paperPnl>=0?"+":"")+paperPnl.toFixed(2)+" USDT"} color={paperPnl>=0?C.green:C.red} />
      <StatBox label="Daily Loss" value={`$${dailyLoss.toFixed(2)} / $${maxLoss}`} color={dailyLoss>maxLoss*.7?C.red:C.gold} />
      <StatBox label="Mode" value={mode.toUpperCase()} color={mode==="live"?C.red:C.gold} />
    </div>
    {trades.length===0
      ? <div style={{ textAlign:"center",padding:60,color:C.muted,fontSize:12 }}>No trades yet. Execute signals from the SIGNALS tab.</div>
      : trades.map((t,i)=>(
        <div key={i} style={{ display:"flex",flexWrap:"wrap",gap:16,alignItems:"center",background:t.status==="open"?`${C.blue}06`:C.s1,border:`1px solid ${t.status==="open"?C.blue+"22":C.border}`,borderRadius:10,padding:"12px 16px",marginBottom:8 }}>
          <div style={{ flex:1,minWidth:180 }}>
            <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4 }}>
              <span style={{ fontSize:13,color:t.status==="open"?C.bright:C.sub,fontWeight:700 }}>{t.symbol}</span>
              <Pill color={t.side==="Buy"?C.green:C.red}>{t.side}</Pill>
              <Tag color={t.mode==="live"?C.red:C.gold}>{t.mode.toUpperCase()}</Tag>
            </div>
            <div style={{ fontSize:9,color:C.muted }}>AGT-{String(t.agentId).padStart(2,"0")} · {t.agentName} · ${t.price.toFixed(4)} · Qty {t.qty} · {t.leverage}×</div>
          </div>
          <div style={{ display:"flex",gap:18,alignItems:"center",flexWrap:"wrap" }}>
            {[["S/L",`$${t.sl.toFixed(4)}`,C.red],["T/P",`$${t.tp.toFixed(4)}`,C.green]].map(([l,v,col])=>(
              <div key={l}><div style={{ fontSize:7,color:C.muted }}>{l}</div><div style={{ fontSize:11,color:col,fontWeight:700 }}>{v}</div></div>
            ))}
            {t.pnl!=null && <div><div style={{ fontSize:7,color:C.muted }}>P&L</div><div style={{ fontSize:14,color:t.pnl>=0?C.green:C.red,fontWeight:700 }}>{t.pnl>=0?"+":""}{t.pnl.toFixed(2)}</div></div>}
            <Tag color={t.status==="open"?C.blue:C.sub}>{t.status==="open"?"OPEN":"CLOSED"}</Tag>
          </div>
        </div>
      ))
    }
  </div>
));

const MarketView = memo(({ tickers }) => {
  const sorted = useMemo(()=>[...tickers].sort((a,b)=>parseFloat(b.volume24h)-parseFloat(a.volume24h)),[tickers]);
  return (
    <div className="fade-up">
      <div style={{ fontSize:8,color:C.sub,letterSpacing:2,marginBottom:14 }}>ALL USDT PERPETUAL PAIRS — BYBIT LIVE ({tickers.length} pairs)</div>
      <div style={{ display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr 1fr",padding:"4px 12px",marginBottom:6 }}>
        {["PAIR","PRICE","24H %","VOLUME","FUNDING"].map(h=><span key={h} style={{ fontSize:8,color:C.muted,letterSpacing:2,textAlign:h==="PAIR"?"left":"right" }}>{h}</span>)}
      </div>
      <div style={{ maxHeight:600,overflowY:"auto" }}>
        {sorted.map(t=>{
          const chg=parseFloat(t.price24hPcnt)*100, price=parseFloat(t.lastPrice), vol=parseFloat(t.volume24h)/1e6, fund=parseFloat(t.fundingRate??0)*100;
          return (
            <div key={t.symbol} style={{ display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr 1fr",padding:"6px 12px",borderRadius:7,background:C.s1,marginBottom:2 }}>
              <span style={{ fontSize:11,color:C.body }}>{t.symbol.replace("USDT","")}</span>
              <span style={{ fontSize:11,color:C.bright,textAlign:"right" }}>${price.toLocaleString(undefined,{maximumFractionDigits:4})}</span>
              <span style={{ fontSize:11,color:chg>=0?C.green:C.red,textAlign:"right",fontWeight:700 }}>{chg>=0?"+":""}{chg.toFixed(2)}%</span>
              <span style={{ fontSize:10,color:C.sub,textAlign:"right" }}>${vol.toFixed(0)}M</span>
              <span style={{ fontSize:10,color:Math.abs(fund)>.05?C.violet:C.muted,textAlign:"right" }}>{fund.toFixed(4)}%</span>
            </div>
          );
        })}
      </div>
    </div>
  );
});

const ConfigView = memo(({ leverage,setLeverage,size,setSize,maxLoss,setMaxLoss,maxTrades,setMaxTrades,mode,setMode }) => (
  <div className="fade-up" style={{ maxWidth:520 }}>
    <div style={{ background:C.s1,border:`1px solid ${C.border}`,borderRadius:14,padding:18,marginBottom:16 }}>
      <div style={{ fontSize:9,color:C.sub,letterSpacing:2,marginBottom:14 }}>TRADING MODE</div>
      <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
        {[["paper","📄 PAPER","Simulation · No real orders",C.gold],["live","🔴 LIVE","Real orders on Bybit",C.red]].map(([m,label,sub,col])=>(
          <button key={m} onClick={()=>setMode(m)} style={{ padding:"14px 10px",borderRadius:11,textAlign:"center",border:`2px solid ${mode===m?col:C.border}`,background:mode===m?`${col}10`:"transparent",color:mode===m?col:C.sub,transition:"all .2s" }}>
            <div style={{ fontSize:13,fontWeight:700,marginBottom:5 }}>{label}</div>
            <div style={{ fontSize:8,opacity:.6 }}>{sub}</div>
          </button>
        ))}
      </div>
      {mode==="live" && <div style={{ marginTop:12,padding:"9px 12px",fontSize:10,color:C.red,lineHeight:1.7,background:`${C.red}07`,border:`1px solid ${C.red}20`,borderRadius:8 }}>⚠ LIVE MODE ACTIVE — Real funds at risk. Agents will place real orders.</div>}
    </div>
    <Slider label="TRADE SIZE (USDT)" value={size}      set={setSize}      min={5}   max={500}  step={5}  color={C.gold}                                                   fmt={v=>`$${v}`} />
    <Slider label="LEVERAGE"          value={leverage}  set={setLeverage}  min={1}   max={100}  step={1}  color={leverage>25?C.red:leverage>10?C.amber:C.green}              fmt={v=>`${v}×`} warnAbove={25} />
    <Slider label="MAX DAILY LOSS"    value={maxLoss}   set={setMaxLoss}   min={10}  max={2000} step={10} color={C.red}                                                      fmt={v=>`$${v}`} />
    <Slider label="MAX OPEN TRADES"   value={maxTrades} set={setMaxTrades} min={1}   max={14}   step={1}  color={C.blue}                                                     fmt={v=>`${v}`} />
  </div>
));

// ─────────────────────────────────────────────────────────────────
// §10  ROOT APP
// ─────────────────────────────────────────────────────────────────
function App() {
  // API keys
  const [keys,     setKeys]     = useState({ bybitKey:"", bybitSecret:"", claudeKey:"" });
  const [balance,  setBalance]  = useState(null);
  const [positions,setPositions]= useState([]);
  const [testStatus,setTestStatus] = useState(null);

  // Market
  const [tickers,   setTickers]   = useState([]);
  const [rd,        setRd]        = useState({ key:"RANGING", confidence:50, stats:{} });
  const [signals,   setSignals]   = useState([]);
  const [status,    setStatus]    = useState("INIT");
  const [lastSync,  setLastSync]  = useState(null);
  const [countdown, setCountdown] = useState(30);

  // Briefings
  const [briefings, setBriefings] = useState({ mm:"", leads:{}, seniors:{} });
  const [loading,   setLoading]   = useState({});
  const setLoad = useCallback((k,v)=>setLoading(p=>({...p,[k]:v})),[]);

  // Config
  const [leverage,  setLeverage]  = useState(5);
  const [size,      setSize]      = useState(20);
  const [maxLoss,   setMaxLoss]   = useState(100);
  const [maxTrades, setMaxTrades] = useState(6);
  const [mode,      setMode]      = useState("paper");

  // Trades
  const [trades,    setTrades]    = useState([]);
  const [paperPnl,  setPaperPnl]  = useState(0);
  const [dailyLoss, setDailyLoss] = useState(0);

  // UI
  const [tab, setTab] = useState("api");
  const { toast, show: showToast } = useToast();

  const R         = REGIMES[rd.key] ?? REGIMES.RANGING;
  const openCount = useMemo(()=>trades.filter(t=>t.status==="open").length,[trades]);

  const statStrip = useMemo(()=>[
    ["AVG CHANGE",  (rd.stats.avg??0)+"%",                   parseFloat(rd.stats.avg??0)>=0?C.green:C.red],
    ["BULL PAIRS",  `${rd.stats.bulls??0}/${rd.stats.total??0}`, C.green],
    ["BEAR PAIRS",  `${rd.stats.bears??0}/${rd.stats.total??0}`, C.red],
    ["VOL SPIKES",  rd.stats.spikes??0,                      C.amber],
    ["BTC FUNDING", rd.stats.funding??"—",                   C.violet],
    ["SIGNALS",     signals.length,                          C.gold],
    ["OPEN TRADES", `${openCount}/${maxTrades}`,             C.blue],
    ["PAPER P&L",   (paperPnl>=0?"+":"")+paperPnl.toFixed(2), paperPnl>=0?C.green:C.red],
  ],[rd.stats,signals.length,openCount,maxTrades,paperPnl]);

  // Test API connection
  const testConnection = useCallback(async(k)=>{
    if (!k.bybitKey || !k.claudeKey) return;
    setTestStatus({ ok:null, msg:"Testing connection..." });
    try {
      const bal = await getBalance(k.bybitKey, k.bybitSecret);
      if (bal !== null) {
        setBalance(bal);
        const pos = await getOpenPositions(k.bybitKey, k.bybitSecret);
        setPositions(pos);
        setTestStatus({ ok:true, msg:`✅ Bybit connected — Balance: $${bal.toFixed(2)} USDT · ${pos.length} open positions` });
      } else {
        setTestStatus({ ok:false, msg:"❌ Bybit connection failed. Check your API key and permissions." });
      }
    } catch(e) {
      setTestStatus({ ok:false, msg:`❌ Error: ${e.message}` });
    }
  },[]);

  // Market fetch
  const fetchMarket = useCallback(async()=>{
    setStatus("SCANNING...");
    try {
      const t   = await fetchTickers();
      const rdv = detectRegime(t);
      setTickers(t); setRd(rdv); setLastSync(new Date()); setStatus("LIVE");
      const sigs = generateSignals(t, rdv.key, leverage, size);
      setSignals(sigs);
      return { tickers:t, rd:rdv };
    } catch(e) { setStatus("ERROR"); return null; }
  },[leverage,size]);

  // 4-tier AI cascade
  const runCascade = useCallback(async(market)=>{
    if (!market || !keys.claudeKey) return;
    const { tickers:t, rd:r } = market;

    setLoad("mm",true);
    const mmP = buildMMPrompt(r.key,r,t);
    let mmText="";
    try { mmText=await callClaude(keys.claudeKey,mmP.system,mmP.user); setBriefings(p=>({...p,mm:mmText})); }
    catch { mmText="Director signal lost."; setBriefings(p=>({...p,mm:mmText})); }
    setLoad("mm",false);

    await Promise.all(TEAMS.map(async team=>{
      const tid=team.id;
      setLoad(`lead_${tid}`,true);
      const lP=buildLeadPrompt(team,r.key,r,mmText);
      let lText="";
      try { lText=await callClaude(keys.claudeKey,lP.system,lP.user); setBriefings(p=>({...p,leads:{...p.leads,[tid]:lText}})); }
      catch { lText=`${team.lead.name} offline.`; setBriefings(p=>({...p,leads:{...p.leads,[tid]:lText}})); }
      setLoad(`lead_${tid}`,false);

      setLoad(`senior_${tid}`,true);
      const sP=buildSeniorPrompt(team,r.key,r,lText);
      try { const b=await callClaude(keys.claudeKey,sP.system,sP.user); setBriefings(p=>({...p,seniors:{...p.seniors,[tid]:b}})); }
      catch { setBriefings(p=>({...p,seniors:{...p.seniors,[tid]:`${team.senior.name} offline.`}})); }
      setLoad(`senior_${tid}`,false);
    }));
  },[keys.claudeKey,setLoad]);

  // 30-second cycle
  const runCycle = useCallback(async()=>{
    const market = await fetchMarket();
    await runCascade(market);
    setCountdown(30);
  },[fetchMarket,runCascade]);

  useEffect(()=>{
    runCycle();
    const cd=setInterval(()=>setCountdown(c=>{ if(c<=1){ runCycle(); return 30; } return c-1; }),1000);
    return()=>clearInterval(cd);
  },[runCycle]);

  // Execute trade
  const execute = useCallback(async(sig)=>{
    if (dailyLoss>=maxLoss)   { showToast("⛔ Daily loss limit hit.","error"); return; }
    if (openCount>=maxTrades) { showToast(`⛔ Max ${maxTrades} open trades.`,"error"); return; }

    if (mode==="live" && keys.bybitKey) {
      showToast(`⏳ Placing LIVE order: ${sig.side} ${sig.symbol}...`,"info");
      const res = await placeOrder(keys.bybitKey, keys.bybitSecret, sig.symbol, sig.side, sig.qty, sig.leverage, sig.sl, sig.tp);
      if (res?.retCode===0) {
        const trade={...sig,orderId:res.result?.orderId,status:"open",mode:"live",openTime:Date.now()};
        setTrades(p=>[trade,...p]);
        showToast(`✅ LIVE: ${sig.side} ${sig.qty} ${sig.symbol} @ $${sig.price.toFixed(2)}`,"success");
      } else {
        showToast(`❌ Order failed: ${res?.retMsg??"Unknown error"}`,"error");
      }
    } else {
      const trade={...sig,orderId:"T"+Date.now(),status:"open",mode:"paper",openTime:Date.now()};
      setTrades(p=>[trade,...p]);
      showToast(`📄 PAPER: ${sig.side} ${sig.qty} ${sig.symbol} @ $${sig.price.toFixed(2)}`,"success");
      setTimeout(()=>{
        const pnl=sig.size*sig.leverage*((Math.random()-.42)*.04);
        setPaperPnl(p=>p+pnl);
        if(pnl<0) setDailyLoss(p=>p+Math.abs(pnl));
        setTrades(p=>p.map(t=>t.orderId===trade.orderId?{...t,status:"closed",pnl}:t));
      },30_000);
    }
  },[dailyLoss,maxLoss,openCount,maxTrades,mode,keys,showToast]);

  const TABS = useMemo(()=>[
    ["api",     "🔑 API KEYS"],
    ["org",     "🏛 HIERARCHY"],
    ["command", "⚡ COMMAND"],
    ["signals", `🎯 SIGNALS (${signals.length})`],
    ["trades",  `📋 TRADES (${openCount})`],
    ["market",  "📊 MARKET"],
    ["config",  "⚙ CONFIG"],
  ],[signals.length,openCount]);

  const apiConnected = keys.bybitKey && keys.claudeKey;

  return (
    <div style={{ minHeight:"100vh",background:C.s0,color:C.body }}>
      {/* Background */}
      <div aria-hidden style={{ position:"fixed",inset:0,pointerEvents:"none",zIndex:0 }}>
        <div style={{ position:"absolute",inset:0,backgroundImage:`linear-gradient(${C.border} 1px,transparent 1px),linear-gradient(90deg,${C.border} 1px,transparent 1px)`,backgroundSize:"64px 64px",opacity:.6 }} />
        {[[C.gold,"6%","10%",500,.025],[C.blue,"88%","55%",400,.03],[C.violet,"46%","90%",350,.025],[R.color,"94%","6%",260,.04]].map(([col,x,y,s,op],i)=>(
          <div key={i} style={{ position:"absolute",left:x,top:y,width:s,height:s,borderRadius:"50%",background:col,filter:`blur(${s*.55}px)`,opacity:op,transform:"translate(-50%,-50%)" }} />
        ))}
      </div>

      {toast && <ToastBanner {...toast} />}

      {/* HEADER */}
      <header style={{ position:"sticky",top:0,zIndex:200,background:"rgba(6,8,15,0.97)",backdropFilter:"blur(24px)",borderBottom:`1px solid ${C.border}` }}>
        <div style={{ maxWidth:1400,margin:"0 auto",padding:"14px 24px" }}>
          <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:12 }}>
            <div style={{ display:"flex",alignItems:"center",gap:12 }}>
              <div style={{ width:38,height:38,borderRadius:10,flexShrink:0,background:`${C.gold}12`,border:`1px solid ${C.gold}35`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,color:C.gold }}>◈</div>
              <div>
                <div style={{ fontSize:20,fontWeight:900,color:C.gold,fontFamily:"'Unbounded',sans-serif",letterSpacing:5,lineHeight:1 }}>MASTERMIND</div>
                <div style={{ fontSize:8,color:C.muted,letterSpacing:3,marginTop:3 }}>INSTITUTIONAL SYSTEM · 4 TIERS · 14 AGENTS · BYBIT PERPS</div>
              </div>
            </div>
            <div style={{ display:"flex",alignItems:"center",gap:8,flexWrap:"wrap" }}>
              {/* API status dot */}
              <div style={{ display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:apiConnected?`${C.green}08`:`${C.amber}08`,border:`1px solid ${apiConnected?C.green:C.amber}30`,borderRadius:8 }}>
                <Dot color={apiConnected?C.green:C.amber} size={6} />
                <span style={{ fontSize:9,color:apiConnected?C.green:C.amber,fontWeight:700 }}>{apiConnected?"API LIVE":"NO API"}</span>
              </div>
              <div style={{ padding:"6px 11px",background:`${R.color}08`,border:`1px solid ${R.color}28`,borderRadius:8,textAlign:"center" }}>
                <div style={{ fontSize:8,color:C.sub,letterSpacing:1 }}>REGIME</div>
                <div style={{ fontSize:11,color:R.color,fontWeight:700 }}>{R.icon} {R.label}</div>
              </div>
              {[
                [C.green, "P&L",  (paperPnl>=0?"+":"")+paperPnl.toFixed(2)],
                [C.blue,  "OPEN", `${openCount}/${maxTrades}`],
                [status==="LIVE"?C.green:C.red, "●", status],
                [C.gold,  "NEXT", countdown+"s"],
              ].map(([col,l,v])=>(
                <div key={l} style={{ padding:"6px 11px",textAlign:"center",minWidth:52,background:C.s1,border:`1px solid ${C.border}`,borderRadius:8 }}>
                  <div style={{ fontSize:7,color:C.sub,letterSpacing:2 }}>{l}</div>
                  <div style={{ fontSize:12,color:col,fontWeight:700 }}>{v}</div>
                </div>
              ))}
              {balance!=null && (
                <div style={{ padding:"6px 12px",background:`${C.green}06`,border:`1px solid ${C.green}20`,borderRadius:8 }}>
                  <div style={{ fontSize:7,color:C.sub }}>BALANCE</div>
                  <div style={{ fontSize:12,color:C.green,fontWeight:700 }}>${balance.toLocaleString(undefined,{maximumFractionDigits:2})}</div>
                </div>
              )}
            </div>
          </div>
          <Bar pct={(countdown/30)*100} color={R.color} h={2} />
        </div>
        <div style={{ maxWidth:1400,margin:"0 auto",padding:"0 24px",display:"flex",gap:0,borderTop:`1px solid ${C.border}`,overflowX:"auto" }}>
          {TABS.map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{ background:"none",border:"none",borderBottom:tab===id?`2px solid ${C.gold}`:"2px solid transparent",color:tab===id?C.gold:C.sub,padding:"10px 18px",fontSize:9,fontWeight:700,letterSpacing:1,whiteSpace:"nowrap",transition:"color .2s,border-color .2s" }}>
              {id==="api" && !apiConnected ? <span style={{ color:C.amber }}>⚠ {label}</span> : label}
            </button>
          ))}
        </div>
      </header>

      <main style={{ maxWidth:1400,margin:"0 auto",padding:"24px",position:"relative",zIndex:1 }}>
        {tab==="api"     && <ApiPanel keys={keys} setKeys={setKeys} balance={balance} positions={positions} onTest={testConnection} testStatus={testStatus} />}
        {tab==="org"     && <OrgView regimeKey={rd.key} />}
        {tab==="command" && <CommandView rd={rd} stats={statStrip} briefings={briefings} loading={loading} lastSync={lastSync} countdown={countdown} />}
        {tab==="signals" && <SignalsView signals={signals} onExec={execute} mode={mode} total={rd.stats.total} />}
        {tab==="trades"  && <TradesView trades={trades} paperPnl={paperPnl} dailyLoss={dailyLoss} maxLoss={maxLoss} maxTrades={maxTrades} openCount={openCount} mode={mode} />}
        {tab==="market"  && <MarketView tickers={tickers} />}
        {tab==="config"  && <ConfigView leverage={leverage} setLeverage={setLeverage} size={size} setSize={setSize} maxLoss={maxLoss} setMaxLoss={setMaxLoss} maxTrades={maxTrades} setMaxTrades={setMaxTrades} mode={mode} setMode={setMode} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
